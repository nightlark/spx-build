name: Build Remote SPX-GC Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clone SPX-GC Repository
        uses: actions/checkout@v4
        with:
          repository: TuomoKu/SPX-GC
          ref: master
          path: spx-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and Package
        shell: pwsh
        working-directory: ./spx-source
        run: |
          npm install
          
          mkdir -Force build

          # pkg does not support node20 target
          npx pkg . --targets node18-win-x64 --output build/spx-graphics.exe
          
          mkdir -Force ../dist
          
          if (Test-Path "build/spx-graphics.exe") {
              Copy-Item "build/spx-graphics.exe" -Destination "../dist/"
              Write-Host "Successfully copied executable."
          } else {
              Write-Error "Executable was not created. Check pkg output above."
              exit 1
          }
          
          $folders = @("cfg", "dat", "templates")
          foreach ($f in $folders) {
              if (Test-Path $f) {
                  Copy-Item -Path $f -Destination "../dist/" -Recurse -Force
                  Write-Host "Copied folder: $f"
              }
          }
          
          if (Test-Path "LICENSE.txt") {
              Copy-Item "LICENSE.txt" -Destination "../dist/"
          }

          Copy-Item "package.json" -Destination "../dist/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spx-graphics-portable
          path: dist/