name: Build Remote SPX-GC Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clone SPX-GC Repository
        uses: actions/checkout@v4
        with:
          repository: TuomoKu/SPX-GC
          ref: master
          path: spx-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Upgraded to 20 to satisfy dependencies

      - name: Build and Package
        shell: pwsh
        working-directory: ./spx-source
        run: |
          # 1. Install dependencies
          npm install
          
          # 2. Build the executable using npx (no global install needed)
          # We use '.' to let pkg read the package.json
          mkdir -Force build
          npx pkg . --targets node20-win-x64 --output build/spx-graphics.exe
          
          # 3. Create the distribution folder
          mkdir -Force ../dist
          
          # 4. Move the executable to dist
          if (Test-Path "build/spx-graphics.exe") {
              Copy-Item "build/spx-graphics.exe" -Destination "../dist/"
              Write-Host "Successfully copied executable."
          } else {
              Write-Error "Executable was not created. Check pkg output above."
              exit 1
          }
          
          # 5. Copy required asset folders recursively
          $folders = @("cfg", "dat", "templates")
          foreach ($f in $folders) {
              if (Test-Path $f) {
                  Copy-Item -Path $f -Destination "../dist/" -Recurse -Force
                  Write-Host "Copied folder: $f"
              } else {
                  Write-Warning "Folder $f not found in source, skipping."
              }
          }
          
          # 6. Copy License and Package Info
          if (Test-Path "LICENSE.txt") { Copy-Item "LICENSE.txt" -Destination "../dist/" }
          Copy-Item "package.json" -Destination "../dist/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spx-graphics-portable
          path: dist/